<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroPlay - Neon Universe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .sound-btn { 
            background: rgba(255, 255, 255, 0.1); 
            border: 2px solid #fff; 
            color: #fff; 
            padding: 8px 15px; 
            cursor: pointer; 
            font-family: 'Orbitron', sans-serif; 
            font-size: 13px; 
            border-radius: 4px;
            transition: all 0.3s ease;
            min-width: 150px;
        }
        .sound-btn.active { 
            background: rgba(0, 242, 255, 0.2); 
            border-color: #00f2ff; 
            color: #00f2ff; 
            box-shadow: 0 0 10px #00f2ff;
        }
    </style>
</head>
<body>
    <script src="sound-effects.js"></script>
    <header class="header">
        <div class="logo-container" style="display:flex; align-items:center; gap:20px;">
            <div class="logo">RETROPLAY</div>
            <button id="sound-toggle-btn" class="sound-btn">🔊 SOUND: OFF</button>
        </div>
        <nav class="nav">
            <a href="#" class="nav-link active">Home</a>
            <a href="#" class="nav-link">Favorites</a>
            <a href="#" class="nav-link">Originals</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="category-tabs">
            <button class="tab-btn active" data-category="NES">NES</button>
            <button class="tab-btn" data-category="SNES">SNES</button>
            <button class="tab-btn" data-category="GBA">GBA</button>
            <button class="tab-btn" data-category="original">ORIGINALS</button>
        </div>

        <div id="game-grid" class="game-grid">
            <!-- Games will be rendered here -->
            <div class="loading-spinner">Loading Retro Universe...</div>
        </div>
    </main>

    <!-- Overlay / Emulator Container -->
    <div id="emulator-overlay" class="emulator-overlay">
        <div class="emulator-header">
            <h2 id="current-game-title">Game Title</h2>
            <button class="close-btn" onclick="closeGame()">&times;</button>
        </div>
        <div class="emulator-screen">
            <div id="emulator"></div>
        </div>
    </div>

    <!-- Core App Logic (Integrated V6) -->
    <script>
        // --- 1. Sound Logic ---
        let isSoundEnabled = false;
        async function toggleSound() {
            const btn = document.getElementById('sound-toggle-btn');
            if (!isSoundEnabled) {
                // Try Enabling
                const success = await window.SoundEngine.init();
                if (success) {
                    isSoundEnabled = true;
                    btn.innerHTML = '🔈 SOUND: ON';
                    btn.classList.add('active');
                    window.SoundEngine.playBonus();
                    console.log("Sound Enabled via Toggle");
                }
            } else {
                // Disable (Mute)
                isSoundEnabled = false;
                btn.innerHTML = '🔊 SOUND: OFF';
                btn.classList.remove('active');
                console.log("Sound Muted");
            }
        }
        
        // Immediate bind to button as soon as it exists
        document.getElementById('sound-toggle-btn').onclick = toggleSound;

        // --- 2. Game Data & Rendering ---
        const games = [
            { id: 'rj2077', title: 'RetroJump 2077', category: 'original', console: 'Web', cover: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400&q=80' },
            { id: 'ng2077', title: 'Neon Galaga 2077', category: 'original', console: 'Web', cover: 'https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=400&q=80' },
            { id: 'mario', title: 'Super Mario Bros', category: 'NES', console: 'NES', rom: 'roms/Super Mario Bros.nes', cover: 'https://images.unsplash.com/photo-1605898835373-043ec2c57802?w=400&q=80' },
            { id: 'pacman', title: 'Pac-Man', category: 'NES', console: 'NES', rom: 'roms/Pac-Man.nes', cover: 'https://images.unsplash.com/photo-1579373903781-fd5c0c30c4cd?w=400&q=80' }
        ];

        function renderGames(category = 'NES') {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            const filtered = category === 'All' ? games : games.filter(g => g.category === category);
            
            filtered.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => launchGame(game);
                card.innerHTML = `
                    <div class="game-cover"><img src="${game.cover}" alt="${game.title}"></div>
                    <div class="game-info">
                        <h3>${game.title}</h3>
                        <p>${game.console}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderGames(btn.dataset.category);
                };
            });
        }

        function launchGame(game) {
            const overlay = document.getElementById('emulator-overlay');
            const title = document.getElementById('current-game-title');
            title.innerText = game.title;
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            if (game.category === 'original') {
                const emu = document.getElementById('emulator');
                emu.innerHTML = `<canvas id="game-canvas"></canvas>`;
                setTimeout(() => {
                    let engine;
                    if (game.id === 'rj2077') engine = new RetroJumpGame('game-canvas');
                    else if (game.id === 'ng2077') engine = new NeonGalagaGame('game-canvas');
                    if(engine) engine.run();
                }, 100);
            } else {
                // EmulatorJS logic here...
                console.log("Launching emulator for:", game.rom);
            }
        }

        function closeGame() {
            document.getElementById('emulator-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
            document.getElementById('emulator').innerHTML = '';
        }

        window.onload = () => {
            renderGames('NES');
            setupTabs();
            console.log("Portal Initialized V6");
        };
    </script>
    <!-- Fallback external engines -->
    <script src="game-engine.js" onerror="console.log('Using integrated fallback')"></script>
    <script src="galaga-engine.js" onerror="console.log('Using integrated fallback')"></script>
</body>
</html>
