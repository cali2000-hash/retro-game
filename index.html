<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetroPlay | Classic Game Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .sound-btn { background: transparent; border: 1px solid #fff; color: #fff; padding: 5px 10px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 12px; }
        .sound-btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>
    <script src="sound-effects.js"></script>
    <header class="header">
        <div class="logo-container" style="display:flex; align-items:center; gap:20px;">
            <div class="logo">RETROPLAY</div>
            <button id="sound-on-btn" class="sound-btn">🔊 SOUND ON</button>
        </div>
        <nav class="nav">
            <a href="#" class="nav-link active">Home</a>
            <a href="#" class="nav-link">Favorites</a>
            <a href="#" class="nav-link">About</a>
        </nav>
    </header>

    <main class="main-content">
        <section class="hero">
            <h1 class="hero-title">Classic Gaming Reborn</h1>
            <p class="hero-subtitle">Play retro legends instantly in your browser. No downloads required.</p>
        </section>

        <section class="game-explorer">
            <div class="category-tabs">
                <button class="tab-btn active" data-system="all">All</button>
                <button class="tab-btn" data-system="nes">NES</button>
                <button class="tab-btn" data-system="snes">SNES</button>
                <button class="tab-btn" data-system="gba">GBA</button>
                <button class="tab-btn" data-system="genesis">Genesis</button>
                <button class="tab-btn" data-system="original">Originals</button>
            </div>

            <div id="game-grid" class="game-grid">
                <!-- Games will be injected here -->
                <div class="loading">Loading Retro Universe...</div>
            </div>
        </section>
    </main>

    <div id="emulator-container" class="emulator-container hidden">
        <div class="emulator-overlay">
            <div class="emulator-header">
                <h2 id="current-game-title">Game Title</h2>
                <button id="close-emulator" class="close-btn">&times;</button>
            </div>
            <div id="emulator" class="emulator-screen"></div>
        </div>
    </div>

    <!-- INLINED GAME ENGINES & LOGIC FOR MAXIMUM STABILITY -->
    <script>
        // --- DATA ---
        const GAMES = [
            { id: 'retrojump-2077', title: 'RetroJump 2077', system: 'original', image: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=80' },
            { id: 'neongalaga-2077', title: 'Neon Galaga 2077', system: 'original', image: 'https://images.unsplash.com/photo-1614027164847-1b2809eb1899?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=80' },
            { id: 'mario1', title: 'Super Mario Bros.', system: 'nes', image: 'https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=80', romUrl: '/roms/mario1.nes' },
            { id: 'mario2', title: 'Super Mario Bros. 2', system: 'nes', image: 'https://images.unsplash.com/photo-1627063411738-95af79685a97?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=80', romUrl: '/roms/mario2.nes' },
            { id: 'mario3', title: 'Super Mario Bros. 3', system: 'nes', image: 'https://images.unsplash.com/photo-1605897472359-85e4b94d685d?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=80', romUrl: '/roms/mario3.nes' },
            { id: 'tetris', title: 'Tetris', system: 'nes', image: 'https://images.unsplash.com/photo-1509198397868-475647b2a1e5?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=80', romUrl: '/roms/tetris.nes' },
            { id: 'pacman', title: 'Pac-Man', system: 'nes', image: 'https://images.unsplash.com/photo-1579309401359-10701513a672?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=80', romUrl: '/roms/pacman.nes' },
            { id: 'contra', title: 'Contra', system: 'nes', image: 'https://images.unsplash.com/photo-1590492463428-250325d70e4e?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=80', romUrl: '/roms/contra.nes' },
            { id: 'zelda1', title: 'The Legend of Zelda', system: 'nes', image: 'https://images.unsplash.com/photo-1566577739112-5180d4bf9390?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=80', romUrl: '/roms/zelda1.nes' },
            { id: 'smworld', title: 'Super Mario World', system: 'snes', image: 'https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=80', romUrl: '/roms/smworld.sfc' }
        ];

        let currentSystem = 'all';

        // --- ENGINES (Placeholders/Simplified) ---
        class BaseEngine {
            constructor(id) { this.canvas = document.getElementById(id); this.ctx = this.canvas.getContext('2d'); }
            run() { this.loop(); }
            loop() { this.update && this.update(); this.draw && this.draw(); requestAnimationFrame(() => this.loop()); }
        }

        // --- CORE LOGIC ---
        function renderGames() {
            const grid = document.getElementById('game-grid');
            if (!grid) return;
            grid.innerHTML = '';
            const filtered = currentSystem === 'all' ? GAMES : GAMES.filter(g => g.system === currentSystem);
            filtered.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div class="game-image-wrapper"><img src="${game.image}" alt="${game.title}" class="game-image"></div>
                    <div class="game-info"><span class="game-system">${game.system}</span><h3 class="game-title">${game.title}</h3></div>
                `;
                card.onclick = () => launchGame(game);
                grid.appendChild(card);
            });
        }

        function launchGame(game) {
            document.getElementById('current-game-title').textContent = game.title;
            const container = document.getElementById('emulator-container');
            container.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            
            const screen = document.getElementById('emulator');
            screen.innerHTML = '';

            if (game.system === 'original') {
                const canvas = document.createElement('canvas');
                canvas.id = 'original-canvas';
                canvas.width = 800; canvas.height = 400;
                canvas.style.width = '100%'; canvas.style.height = 'auto';
                screen.appendChild(canvas);
                
                // Fallback for missing engine files
                if (typeof RetroJumpGame !== 'undefined' && game.id === 'retrojump-2077') {
                   new RetroJumpGame('original-canvas').run();
                } else if (typeof NeonGalagaGame !== 'undefined' && game.id === 'neongalaga-2077') {
                   new NeonGalagaGame('original-canvas').run();
                } else {
                   const ctx = canvas.getContext('2d');
                   ctx.fillStyle = '#ff00ff';
                   ctx.font = '20px Orbitron';
                   ctx.fillText('Original Engine Initializing...', 50, 50);
                }
            } else {
                screen.innerHTML = '<div id="ejs-game" style="width:100%;height:100%"></div>';
                window.EJS_player = '#ejs-game';
                window.EJS_gameUrl = window.location.origin + game.romUrl;
                window.EJS_core = game.system === 'nes' ? 'fceumm' : 'snes9x';
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                window.EJS_startOnHover = false;
                const script = document.createElement('script');
                script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
                document.body.appendChild(script);
            }
        }

        // --- INIT ---
        window.onload = () => {
            renderGames();
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSystem = btn.dataset.system;
                    renderGames();
                };
            });
            document.getElementById('close-emulator').onclick = () => {
                document.getElementById('emulator-container').classList.add('hidden');
                document.body.style.overflow = 'auto';
                document.getElementById('emulator').innerHTML = '';
            };
            // Sound Fix: Manual Unlock Button
            const sBtn = document.getElementById('sound-on-btn');
            if(sBtn) sBtn.onclick = async () => {
                if(window.SoundEngine) {
                    await SoundEngine.init();
                    SoundEngine.playBonus(); // Confirmation Sound
                    sBtn.innerHTML = '🔊 SOUND ACTIVE';
                    sBtn.style.color = '#00f2ff';
                    sBtn.style.borderColor = '#00f2ff';
                }
            };
        };
    </script>
    <!-- Fallback external engines -->
    <script src="game-engine.js" onerror="console.log('Using integrated fallback')"></script>
    <script src="galaga-engine.js" onerror="console.log('Using integrated fallback')"></script>
</body>
</html>
